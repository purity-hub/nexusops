server:
  port: 8083

spring:
  application:
    name: nexusops-monitor
  datasource:
    url: jdbc:postgresql://localhost:5432/nexusops
    username: postgres
    password: password
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.nexusops: DEBUG
